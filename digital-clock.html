<!DOCTYPE html>\n<html lang='en'>\n<head>\n    <meta charset='UTF-8'>\n    <meta name='viewport' content='width=device-width, initial-scale=1.0'>\n    <style>\n        body {\n            font-family: Arial, sans-serif;\n            display: flex;\n            justify-content: center;\n            align-items: center;\n            height: 100vh;\n            background-color: #f0f0f0;\n            color: #333;\n        }\n        #clock {\n            text-align: center;\n        }\n        .time-zone {\n            margin: 10px;\n        }\n    </style>\n    <title>Digital Clock</title>\n</head>\n<body>\n    <div id='clock'>\n        <div class='time-zone' id='utc'>UTC: <span id='utc-time'></span></div>\n        <div class='time-zone' id='est'>EST: <span id='est-time'></span></div>\n        <div class='time-zone' id='pst'>PST: <span id='pst-time'></span></div>\n        <div class='time-zone' id='ist'>IST: <span id='ist-time'></span></div>\n    </div>\n    <script>\n        function updateClock() {\n            const now = new Date();\n            const utc = now.toISOString().slice(0, 19).replace('T', ' ');\n            document.getElementById('utc-time').innerText = utc;\n            document.getElementById('est-time').innerText = new Date(now.toLocaleString('en-US', { timeZone: 'America/New_York' })).toLocaleTimeString();\n            document.getElementById('pst-time').innerText = new Date(now.toLocaleString('en-US', { timeZone: 'America/Los_Angeles' })).toLocaleTimeString();\n            document.getElementById('ist-time').innerText = new Date(now.toLocaleString('en-US', { timeZone: 'Asia/Kolkata' })).toLocaleTimeString();\n        }\n        setInterval(updateClock, 1000);\n        updateClock();\n    </script>\n</body>\n</html>
